<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#0078d4"/>
    </linearGradient>
    <filter id="glowC">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Main hex -->
  <polygon points="37,6 55,6 64,22 55,38 37,38 28,22" fill="url(#hexGrad)" filter="url(#glowC)"/>
  <!-- White checkmark -->
  <polyline points="34,22 40,29 52,14" fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Gold verified star badge -->
  <circle cx="57" cy="8" r="9" fill="#f59e0b"/>
  <polygon points="57,3 58.5,6.5 62,6.5 59.5,8.8 60.5,12.5 57,10.5 53.5,12.5 54.5,8.8 52,6.5 55.5,6.5" fill="white"/>
  <!-- Wordmark -->
  <text x="74" y="26" font-family="'Segoe UI',system-ui,sans-serif" font-weight="700" font-size="22" fill="#ffffff">StackRank<tspan fill="#00a2e8">365</tspan></text>
  <text x="75" y="44" font-family="'Segoe UI',system-ui,sans-serif" font-weight="400" font-size="9" fill="#64748b">Rank. Verify. Get Discovered.</text>
</svg>
