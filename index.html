<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO -->
  <title>StackRank365 — The Verified Microsoft Talent Network</title>
  <meta name="description" content="The verified talent ranking community for Dynamics 365, Power Platform, Copilot Studio, and Azure OpenAI professionals. Stop listing certifications. Start proving expertise." />
  <meta name="keywords" content="Dynamics 365, Power Platform, Copilot Studio, Azure OpenAI, Microsoft certifications, talent ranking, D365 professionals, Microsoft leaderboard" />
  <meta name="author" content="StackRank365" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph (LinkedIn, Facebook, Slack unfurls) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://stackrank365.com/" />
  <meta property="og:title" content="StackRank365 — The Verified Microsoft Talent Network" />
  <meta property="og:description" content="The verified talent ranking community for Dynamics 365, Power Platform, Copilot Studio and Azure OpenAI professionals. Join the waitlist." />
  <meta property="og:image" content="https://stackrank365.com/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="StackRank365" />

  <!-- Twitter / X card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://stackrank365.com/" />
  <meta name="twitter:title" content="StackRank365 — The Verified Microsoft Talent Network" />
  <meta name="twitter:description" content="Verified talent rankings for Dynamics 365, Power Platform and Copilot professionals." />
  <meta name="twitter:image" content="https://stackrank365.com/og-image.png" />

  <!-- Canonical -->
  <link rel="canonical" href="https://stackrank365.com/" />

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- Theme colour (browser chrome on mobile) -->
  <meta name="theme-color" content="#0d1117" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "StackRank365",
    "url": "https://www.stackrank365.com",
    "description": "The verified talent ranking platform for Microsoft professionals. Certifications, projects and community contributions — scored and ranked.",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://www.stackrank365.com/?page=leaderboard&q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
